{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - VisionTrackAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card" style="max-width:480px;">
            <div class="text-center mb-4">
                <div class="brand-icon mx-auto mb-3"
                    style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#22C55E,#3B82F6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;">
                    VT</div>
                <h2>Create Account</h2>
                <p class="auth-subtitle">Join VisionTrackAI Monitoring Platform</p>
            </div>
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger py-2"
                style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#EF4444;font-size:13px;">
                {{ message }}</div>
            {% endfor %}
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-6">
                        <div class="form-group">
                            <label class="vt-label">Username</label>
                            <input type="text" name="username" class="vt-input" placeholder="Username" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="form-group">
                            <label class="vt-label">Email</label>
                            <input type="email" name="email" class="vt-input" placeholder="Email" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="vt-label">Phone Number</label>
                    <input type="tel" name="phone" class="vt-input" placeholder="+91 XXXXXXXXXX">
                </div>
                <div class="form-group">
                    <label class="vt-label">Organization</label>
                    <input type="text" name="organization" class="vt-input" placeholder="Your organization">
                </div>
                <div class="row">
                    <div class="col-6">
                        <div class="form-group">
                            <label class="vt-label">Password</label>
                            <input type="password" name="password" class="vt-input" placeholder="Password" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="form-group">
                            <label class="vt-label">Confirm Password</label>
                            <input type="password" name="password2" class="vt-input" placeholder="Confirm" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-auth mt-2">Create Account</button>
            </form>
            <p class="text-center mt-4" style="font-size:14px;color:var(--text-secondary);">
                Already have an account? <a href="{% url 'accounts:login' %}"
                    style="color:var(--accent-green);font-weight:500;">Sign In</a>
            </p>
        </div>
    </div>
</body>

</html>
