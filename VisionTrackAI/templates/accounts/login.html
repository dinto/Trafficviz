{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VisionTrackAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="brand-icon mx-auto mb-3"
                    style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#22C55E,#3B82F6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;">
                    VT</div>
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Sign in to VisionTrackAI Dashboard</p>
            </div>
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger py-2"
                style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#EF4444;font-size:13px;">
                {{ message }}</div>
            {% endfor %}
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label class="vt-label">Username</label>
                    <input type="text" name="username" class="vt-input" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label class="vt-label">Password</label>
                    <input type="password" name="password" class="vt-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-auth mt-2">Sign In</button>
            </form>
            <p class="text-center mt-4" style="font-size:14px;color:var(--text-secondary);">
                Don't have an account? <a href="{% url 'accounts:signup' %}"
                    style="color:var(--accent-green);font-weight:500;">Sign Up</a>
            </p>
        </div>
    </div>
</body>

</html>
