{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - VisionTrackAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card text-center">
            <div class="brand-icon mx-auto mb-3"
                style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#22C55E,#3B82F6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;">
                VT</div>
            <h2>Verify Your Identity</h2>
            <p class="auth-subtitle">Enter the 6-digit code sent to your device</p>
            {% if otp_hint %}
            <div class="mb-3 p-2"
                style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:8px;font-size:13px;color:var(--accent-green);">
                <i class="bi bi-info-circle"></i> Demo OTP: <strong>{{ otp_hint }}</strong>
            </div>
            {% endif %}
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger py-2"
                style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#EF4444;font-size:13px;">
                {{ message }}</div>
            {% endfor %}
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                <div class="otp-inputs">
                    <input type="text" maxlength="1" class="otp-digit" oninput="otpNext(this)" autofocus>
                    <input type="text" maxlength="1" class="otp-digit" oninput="otpNext(this)">
                    <input type="text" maxlength="1" class="otp-digit" oninput="otpNext(this)">
                    <input type="text" maxlength="1" class="otp-digit" oninput="otpNext(this)">
                    <input type="text" maxlength="1" class="otp-digit" oninput="otpNext(this)">
                    <input type="text" maxlength="1" class="otp-digit" oninput="otpNext(this)">
                </div>
                <input type="hidden" name="otp" id="otpFull">
                <button type="submit" class="btn-auth" onclick="combineOtp()">Verify Code</button>
            </form>
        </div>
    </div>
    <script>
        function otpNext(el) {
            if (el.value.length === 1 && el.nextElementSibling) el.nextElementSibling.focus();
        }
        function combineOtp() {
            var digits = document.querySelectorAll('.otp-digit');
            var otp = '';
            digits.forEach(function (d) { otp += d.value; });
            document.getElementById('otpFull').value = otp;
        }
    </script>
</body>

</html>
