{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verified - VisionTrackAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card text-center">
            <div
                style="width:80px;height:80px;border-radius:50%;background:rgba(34,197,94,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
                <i class="bi bi-check-circle-fill" style="font-size:40px;color:#22C55E;"></i>
            </div>
            <h2 class="glow-green">Verification Successful!</h2>
            <p class="auth-subtitle">Your identity has been verified. Welcome to VisionTrackAI.</p>
            <a href="{% url 'accounts:onboarding' %}" class="btn-auth d-block mt-4"
                style="text-decoration:none;text-align:center;">Start Onboarding</a>
            <a href="{% url 'dashboard:home' %}" class="d-block mt-3"
                style="color:var(--text-muted);font-size:14px;">Skip to Dashboard →</a>
        </div>
    </div>
</body>

</html>
